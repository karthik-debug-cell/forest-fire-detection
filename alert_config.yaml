# ============================================================
# Alert System Configuration
# Forest Fire Detection System
# ============================================================

# Alert severity threshold (fires below this level are not alerted)
# Options: LOW | MODERATE | HIGH | EXTREME
alert_threshold: MODERATE

# Default alert method
# Options: print | email | sms | webhook
default_method: print

# ── Email (SMTP) ───────────────────────────────────────────
email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  # Load credentials from environment variables (recommended)
  sender:    "${ALERT_SENDER}"
  password:  "${ALERT_PASSWORD}"
  recipient: "${ALERT_RECIPIENT}"

# ── Twilio SMS ─────────────────────────────────────────────
sms:
  account_sid: "${TWILIO_ACCOUNT_SID}"
  auth_token:  "${TWILIO_AUTH_TOKEN}"
  from_number: "${TWILIO_FROM_NUMBER}"
  to_number:   "${TWILIO_TO_NUMBER}"

# ── Webhook (Slack / Teams / PagerDuty) ───────────────────
webhook:
  url: "${ALERT_WEBHOOK_URL}"
  headers:
    Content-Type: application/json

# ── Alert cooldown ─────────────────────────────────────────
# Minimum seconds between repeated alerts for the same region
cooldown_seconds: 300
