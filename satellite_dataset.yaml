# ============================================================
# Satellite Wildfire Detection Dataset Configuration
# Compatible with Ultralytics YOLOv8
# ============================================================

# Dataset root (absolute or relative to train.py location)
path: ./dataset

# Subdirectories
train: images/train
val:   images/val
test:  images/test

# Number of classes
nc: 3

# Class names
names:
  0: fire_hotspot   # Active burning pixel cluster
  1: smoke          # Smoke plume from active / recent fire
  2: burn_region    # Post-fire charred / scorched area

# ============================================================
# Dataset Statistics (populate after building dataset)
# ============================================================
# Sources:
#   - Sentinel-2 MSI (10m resolution, bands B4/B3/B2 RGB + B8A NIR)
#   - MODIS Terra/Aqua MOD14/MYD14 (1km, fire radiative power)
#   - VIIRS S-NPP VNP14IMG (375m, I-band active fire)
#   - Landsat 8/9 OLI/TIRS (30m optical + 100m thermal)
#   - NASA FIRMS active fire labels (optional overlay)
#
# Annotation format: YOLO normalized xywh per class
# Image size:        640x640 (primary), 512x512 / 1024x1024 also supported
# Split ratio:       70% train / 15% val / 15% test
# ============================================================

# Augmentation hints (used by train.py override)
augment:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  shear: 2.0
  perspective: 0.0
  flipud: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.05
